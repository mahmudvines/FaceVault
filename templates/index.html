<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceVault — Local Face Recognition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #090b10;
  --surface:   #0e1219;
  --card:      #131720;
  --border:    #1e2535;
  --border2:   #2a3347;
  --accent:    #00e5ff;
  --accent2:   #7c3aed;
  --gold:      #f5c542;
  --danger:    #ff4060;
  --text:      #e8eaf0;
  --muted:     #5a6478;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --r:         12px;
  --r2:        20px;
  --glow:      0 0 30px rgba(0,229,255,0.12);
  --glow2:     0 0 60px rgba(0,229,255,0.06);
}

html, body { height: 100%; }

body {
  font-family: var(--font-mono);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* animated grain overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.6;
}

/* ── Layout ────────────────────────────────────────────── */
.app { display: flex; flex-direction: column; min-height: 100vh; }

/* ── Header ────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(9,11,16,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex; align-items: center; gap: 2rem;
  height: 64px;
}

.logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-head);
  font-size: 1.25rem; font-weight: 800;
  letter-spacing: -0.02em;
}

.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: var(--glow);
}

.logo span { color: var(--accent); }

.stats-bar {
  display: flex; gap: 1.5rem; margin-left: auto;
}

.stat-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 4px 12px;
  font-size: 0.72rem;
  color: var(--muted);
}
.stat-pill b { color: var(--text); font-weight: 500; }
.stat-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

/* ── Main layout ───────────────────────────────────────── */
main {
  display: grid;
  grid-template-columns: 340px 1fr;
  flex: 1;
  min-height: 0;
  height: calc(100vh - 64px);
}

/* ── Sidebar ───────────────────────────────────────────── */
aside {
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  min-height: 0;
  overflow-y: auto;
}

.sidebar-section {
  padding: 1.5rem;
  border-bottom: 1px solid var(--border);
}

.sidebar-section h2 {
  font-family: var(--font-head);
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
}

/* Folder input */
.folder-wrap {
  position: relative;
  margin-bottom: 0.75rem;
}

.folder-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.folder-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
}
.folder-wrap input::placeholder { color: var(--muted); }

/* Buttons */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
  padding: 10px 18px;
  border: none; border-radius: var(--r);
  font-family: var(--font-head);
  font-size: 0.82rem; font-weight: 700;
  letter-spacing: 0.03em;
  cursor: pointer;
  transition: all 0.2s;
  position: relative; overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: white;
  opacity: 0;
  transition: opacity 0.15s;
}
.btn:active::after { opacity: 0.06; }

.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, #00b8d9 100%);
  color: #000;
  box-shadow: 0 4px 20px rgba(0,229,255,0.25);
}
.btn-primary:hover { box-shadow: 0 4px 30px rgba(0,229,255,0.4); transform: translateY(-1px); }

.btn-secondary {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.btn-danger {
  background: rgba(255,64,96,0.1);
  border: 1px solid rgba(255,64,96,0.3);
  color: var(--danger);
}
.btn-danger:hover { background: rgba(255,64,96,0.2); }

.btn-gold {
  background: linear-gradient(135deg, var(--gold), #e8a820);
  color: #000;
  box-shadow: 0 4px 20px rgba(245,197,66,0.2);
}
.btn-gold:hover { box-shadow: 0 4px 30px rgba(245,197,66,0.35); transform: translateY(-1px); }

.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

.btn-row { display: flex; gap: 8px; }
.btn-row .btn { flex: 1; }

/* Progress */
.progress-wrap {
  margin-top: 0.75rem;
  display: none;
}
.progress-wrap.visible { display: block; }

.progress-bar-bg {
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px;
  transition: width 0.3s;
}
.progress-label {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 6px;
}

/* Toast */
#toast {
  position: fixed;
  bottom: 2rem; right: 2rem;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 12px 18px;
  font-size: 0.8rem;
  max-width: 320px;
  z-index: 1000;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.success { border-color: var(--accent); }
#toast.error { border-color: var(--danger); color: var(--danger); }

/* People list */
.people-list {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  padding: 1rem;
  display: flex; flex-direction: column; gap: 6px;
}

.people-list::-webkit-scrollbar { width: 4px; }
.people-list::-webkit-scrollbar-track { background: transparent; }
.people-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

.person-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border-radius: var(--r);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
}
.person-item:hover {
  background: var(--surface);
  border-color: var(--border);
}
.person-item.active {
  background: rgba(0,229,255,0.05);
  border-color: rgba(0,229,255,0.25);
}

.person-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border2);
  background: var(--surface);
  flex-shrink: 0;
  transition: border-color 0.18s;
}
.person-item.active .person-avatar { border-color: var(--accent); }
.person-avatar.placeholder {
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  color: var(--muted);
}

.person-info { flex: 1; min-width: 0; }
.person-name {
  font-family: var(--font-head);
  font-size: 0.85rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.person-name.unnamed { color: var(--muted); font-style: italic; }
.person-count {
  font-size: 0.68rem; color: var(--muted);
  margin-top: 2px;
}

.person-badge {
  font-size: 0.62rem; font-weight: 700;
  padding: 2px 7px; border-radius: 99px;
  background: rgba(0,229,255,0.1);
  color: var(--accent);
  border: 1px solid rgba(0,229,255,0.2);
}

/* ── Detail Panel ──────────────────────────────────────── */
.detail-panel {
  display: flex; flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.detail-empty {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1rem;
  color: var(--muted);
}

.detail-empty .big-icon {
  font-size: 4rem;
  opacity: 0.3;
  filter: grayscale(1);
}
.detail-empty p { font-size: 0.85rem; }

.detail-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.detail-content.visible { display: flex; }

.detail-header {
  padding: 1.5rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 1.5rem;
  flex-wrap: wrap;
}

.detail-avatar-wrap { position: relative; }
.detail-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--accent);
  box-shadow: var(--glow);
  background: var(--surface);
}

.detail-meta { flex: 1; min-width: 200px; }
.detail-meta h2 {
  font-family: var(--font-head);
  font-size: 1.5rem; font-weight: 800;
  letter-spacing: -0.02em;
}
.detail-meta .sub {
  font-size: 0.75rem; color: var(--muted);
  margin-top: 4px;
}

.name-input-wrap {
  display: flex; gap: 8px; align-items: center;
  margin-top: 10px;
}
.name-input {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--font-head);
  font-size: 0.85rem; font-weight: 600;
  padding: 8px 14px;
  outline: none;
  width: 220px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.name-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
}
.name-input::placeholder { color: var(--muted); font-weight: 400; }

.btn-save {
  background: var(--accent);
  color: #000;
  border: none; border-radius: var(--r);
  padding: 8px 16px;
  font-family: var(--font-head);
  font-size: 0.8rem; font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-save:hover { background: #00cfeb; }

.detail-actions {
  display: flex; gap: 8px; margin-top: 12px;
}

.btn-sm {
  padding: 6px 12px;
  font-size: 0.72rem;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  font-family: var(--font-mono);
  transition: all 0.15s;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }

/* Photo grid */
.photo-grid {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 2rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  align-content: start;
}

.photo-grid::-webkit-scrollbar { width: 4px; }
.photo-grid::-webkit-scrollbar-track { background: transparent; }
.photo-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

.photo-thumb {
  aspect-ratio: 1;
  border-radius: var(--r);
  object-fit: cover;
  border: 2px solid var(--border);
  transition: all 0.2s;
  cursor: pointer;
  animation: fadeUp 0.4s ease both;
}
.photo-thumb:hover {
  border-color: var(--accent);
  transform: scale(1.03);
  box-shadow: var(--glow);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Lightbox ──────────────────────────────────────────── */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(5,7,12,0.95);
  backdrop-filter: blur(10px);
  z-index: 500;
  display: none; align-items: center; justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 90vw; max-height: 90vh;
  border-radius: var(--r2);
  box-shadow: 0 0 80px rgba(0,0,0,0.8);
}
.lightbox-close {
  position: absolute; top: 1.5rem; right: 1.5rem;
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 1.2rem;
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
}
.lightbox-close:hover { border-color: var(--danger); color: var(--danger); }

/* ── Empty state ───────────────────────────────────────── */
.empty-people {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  flex: 1;
  gap: 8px;
  color: var(--muted);
  font-size: 0.8rem;
  padding: 2rem;
  text-align: center;
}
.empty-people .icon { font-size: 2.5rem; opacity: 0.3; }

/* ── Search ────────────────────────────────────────────── */
.search-wrap {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
}
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 8px 12px;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }

/* ── Spinner ───────────────────────────────────────────── */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Tabs (sidebar) ────────────────────────────────────── */
.tab-strip {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1; padding: 10px;
  text-align: center;
  font-family: var(--font-head);
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Responsive tweaks ─────────────────────────────────── */
@media (max-width: 720px) {
  main { grid-template-columns: 1fr; }
  aside { max-height: 45vh; }
}

/* Selection mode */
.select-mode .person-item { user-select: none; }
.person-item .check {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 2px solid var(--border2);
  display: none;
  align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.select-mode .person-item .check { display: flex; }
.person-item.selected .check {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

/* Glow on logo */
@keyframes pulse {
  0%,100% { box-shadow: 0 0 20px rgba(0,229,255,0.3); }
  50%      { box-shadow: 0 0 35px rgba(0,229,255,0.55); }
}
.logo-icon { animation: pulse 3s ease-in-out infinite; }
</style>
</head>
<body>
<div class="app">

<!-- ── Header ─────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-icon">👁</div>
    Face<span>Vault</span>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-pill"><span class="dot"></span> <b id="s-people">0</b> people</div>
    <div class="stat-pill"><b id="s-named">0</b> named</div>
    <div class="stat-pill"><b id="s-photos">0</b> photos</div>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────────── -->
<main>

  <!-- Sidebar -->
  <aside>
    <!-- Scan section -->
    <div class="sidebar-section">
      <h2>📂 Scan Folder</h2>
      <div class="folder-wrap">
        <input type="text" id="folderPath" placeholder="C:\Photos\Family" />
      </div>
      <div class="folder-wrap">
        <input type="text" id="outputPath" placeholder="D:\\ahbab\\Education\\Face app\\FaceVault\\Sorted images" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnScan">
          <span>Scan</span>
        </button>
        <button class="btn btn-gold" id="btnSort" title="Copy photos into named folders">
          <span>Sort</span>
        </button>
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
        <div class="progress-label" id="progressLabel">Scanning…</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="sidebar-section" style="padding-bottom:1rem;">
      <h2>⚙️ Actions</h2>
      <button class="btn btn-danger" id="btnReset" style="font-size:0.75rem;padding:8px;">
        🗑 Reset Database
      </button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search people…" />
    </div>

    <!-- People list -->
    <div class="people-list" id="peopleList">
      <div class="empty-people">
        <div class="icon">🙈</div>
        <p>No people found yet.<br>Scan a folder to begin.</p>
      </div>
    </div>
  </aside>

  <!-- Detail panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty" id="detailEmpty">
      <div class="big-icon">👤</div>
      <p>Select a person to view their photos</p>
      <p style="font-size:0.72rem;opacity:0.5;">FaceVault — 100% local, no cloud</p>
    </div>

    <div class="detail-content" id="detailContent">
      <div class="detail-header">
        <div class="detail-avatar-wrap">
          <img class="detail-avatar" id="detailAvatar" src="" alt="">
        </div>
        <div class="detail-meta">
          <h2 id="detailName">Unknown</h2>
          <div class="sub" id="detailSub">0 photos detected</div>
          <div class="name-input-wrap">
            <input class="name-input" id="nameInput" placeholder="Enter name…" maxlength="60" />
            <button class="btn-save" id="btnSaveName">Save</button>
          </div>
          <div class="detail-actions">
            <button class="btn-sm danger" id="btnDeletePerson">🗑 Remove</button>
          </div>
        </div>
      </div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>
  </div>

</main>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let activePerson = null;
let allPeople = [];

// ── Init ───────────────────────────────────────────────────────────────
(async () => {
  const savedOutputPath = localStorage.getItem('outputPath');
  if (savedOutputPath) {
    document.getElementById('outputPath').value = savedOutputPath;
  }
  await refreshStats();
  await loadPeople();
})();

// ── Stats ──────────────────────────────────────────────────────────────
async function refreshStats() {
  const r = await fetch('/api/status').then(r => r.json());
  document.getElementById('s-people').textContent = r.total_people;
  document.getElementById('s-named').textContent = r.named_people;
  document.getElementById('s-photos').textContent = r.total_photos;
}

// ── People List ────────────────────────────────────────────────────────
async function loadPeople() {
  allPeople = await fetch('/api/people').then(r => r.json());
  renderPeople(allPeople);
}

function renderPeople(list) {
  const el = document.getElementById('peopleList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-people"><div class="icon">🙈</div><p>No people found yet.<br>Scan a folder to begin.</p></div>`;
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="person-item ${activePerson?.id === p.id ? 'active' : ''}"
         data-id="${p.id}" onclick="selectPerson(${p.id})">
      ${p.thumbnail
        ? `<img class="person-avatar" src="${p.thumbnail}" alt="">`
        : `<div class="person-avatar placeholder">👤</div>`}
      <div class="person-info">
        <div class="person-name ${!p.name ? 'unnamed' : ''}">${p.name || 'Unnamed'}</div>
        <div class="person-count">${p.count} photo${p.count !== 1 ? 's' : ''}</div>
      </div>
      <div class="person-badge">${p.count}</div>
    </div>
  `).join('');
}

// ── Search ─────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  const filtered = allPeople.filter(p => (p.name || 'unnamed').toLowerCase().includes(q));
  renderPeople(filtered);
});

// ── Select Person ──────────────────────────────────────────────────────
async function selectPerson(id) {
  const data = await fetch(`/api/person/${id}`).then(r => r.json());
  activePerson = data;

  // sidebar highlight
  document.querySelectorAll('.person-item').forEach(el =>
    el.classList.toggle('active', +el.dataset.id === id));

  // show detail
  document.getElementById('detailEmpty').style.display = 'none';
  const dc = document.getElementById('detailContent');
  dc.classList.add('visible');

  document.getElementById('detailName').textContent = data.name || 'Unnamed Person';
  document.getElementById('detailSub').textContent = `${data.count} photo${data.count !== 1 ? 's' : ''} detected`;
  document.getElementById('nameInput').value = data.name || '';

  // avatar
  const av = document.getElementById('detailAvatar');
  if (data.photos.length) av.src = data.photos[0].thumb;

  // photo grid
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = data.photos.map((p, i) => `
    <img class="photo-thumb" src="${p.thumb}" alt=""
         style="animation-delay:${i * 30}ms"
         onclick="openLightbox('${p.thumb}')">
  `).join('');
}

// ── Save Name ──────────────────────────────────────────────────────────
document.getElementById('btnSaveName').onclick = async () => {
  if (!activePerson) return;
  const name = document.getElementById('nameInput').value.trim();
  await fetch('/api/name', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({id: activePerson.id, name})
  });
  activePerson.name = name;
  document.getElementById('detailName').textContent = name || 'Unnamed Person';
  await loadPeople();
  await refreshStats();
  toast('Name saved ✓', 'success');
};

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnSaveName').click();
});

// ── Delete Person ──────────────────────────────────────────────────────
document.getElementById('btnDeletePerson').onclick = async () => {
  if (!activePerson) return;
  if (!confirm('Remove this person from FaceVault?')) return;
  await fetch(`/api/delete/${activePerson.id}`, {method:'DELETE'});
  activePerson = null;
  document.getElementById('detailContent').classList.remove('visible');
  document.getElementById('detailEmpty').style.display = '';
  await loadPeople();
  await refreshStats();
  toast('Person removed', 'success');
};

// ── Scan ───────────────────────────────────────────────────────────────
document.getElementById('btnScan').onclick = async () => {
  const folder = document.getElementById('folderPath').value.trim();
  if (!folder) { toast('Enter a folder path first', 'error'); return; }

  const btn = document.getElementById('btnScan');
  const pw = document.getElementById('progressWrap');
  const pb = document.getElementById('progressBar');
  const pl = document.getElementById('progressLabel');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Scanning…';
  pw.classList.add('visible');

  // Animate progress bar (indeterminate)
  let pct = 0;
  const timer = setInterval(() => {
    pct = Math.min(pct + Math.random() * 8, 88);
    pb.style.width = pct + '%';
  }, 400);

  try {
    const response = await fetch('/api/scan', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({folder})
    });

    const text = await response.text();
    let r;
    try {
      r = JSON.parse(text);
    } catch (parseErr) {
      throw new Error(text || parseErr.message);
    }

    clearInterval(timer);
    pb.style.width = '100%';

    if (!response.ok) {
      toast('Error: ' + (r.error || 'Scan failed'), 'error');
    } else if (r.error) {
      toast('Error: ' + r.error, 'error');
    } else {
      pl.textContent = `✓ ${r.scanned} scanned · ${r.added} with faces · ${r.no_face} no-face`;
      toast(`Found ${r.clusters} people total`, 'success');
      await loadPeople();
      await refreshStats();
    }
  } catch(e) {
    clearInterval(timer);
    toast('Scan failed. ' + (e.message || 'Is the server running?'), 'error');
  } finally {
    setTimeout(() => pw.classList.remove('visible'), 4000);
    btn.disabled = false;
    btn.innerHTML = '<span>Scan</span>';
  }
};

// ── Sort ───────────────────────────────────────────────────────────────
document.getElementById('btnSort').onclick = async () => {
  const btn = document.getElementById('btnSort');
  const outputPath = document.getElementById('outputPath').value.trim();
  if (!outputPath) {
    toast('Enter an output folder path first', 'error');
    return;
  }

  localStorage.setItem('outputPath', outputPath);

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const response = await fetch('/api/sort', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({output_dir: outputPath})
    });

    const r = await response.json();
    if (!response.ok) {
      toast('Sort failed: ' + (r.error || 'Unknown error'), 'error');
    } else {
      toast(`✓ ${r.copied} photos sorted → ${r.output}`, 'success');
    }
  } catch(e) {
    toast('Sort failed. ' + (e.message || 'Please try again'), 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>Sort</span>';
  }
};

// ── Reset ──────────────────────────────────────────────────────────────
document.getElementById('btnReset').onclick = async () => {
  if (!confirm('Delete all face data? This cannot be undone.')) return;
  await fetch('/api/reset', {method:'POST'});
  allPeople = [];
  activePerson = null;
  renderPeople([]);
  document.getElementById('detailContent').classList.remove('visible');
  document.getElementById('detailEmpty').style.display = '';
  await refreshStats();
  toast('Database cleared', 'success');
};

// ── Lightbox ───────────────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightboxClose').onclick = () =>
  document.getElementById('lightbox').classList.remove('open');
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox'))
    document.getElementById('lightbox').classList.remove('open');
});

// ── Toast ──────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}
</script>
</body>
</html>
